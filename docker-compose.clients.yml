# docker-compose.clients.yml — AnsibleRelay Test Clients (Phase 1)
#
# Agents de test connectés au serveur relay distant (192.168.1.218:7770)
# Déployer APRÈS le serveur (docker-compose.yml)
#
# Les agents accèdent au serveur via l'IP/port 192.168.1.218:7770
# (port exposé par docker-compose.yml sur le host)
#
# Déploiement via Docker remote access :
#   DOCKER_HOST=tcp://192.168.1.218:2375 docker compose -f docker-compose.clients.yml up --build -d
#
# Pour vérifier l'enrollment :
#   DOCKER_HOST=tcp://192.168.1.218:2375 docker logs relay-agent-01
#   DOCKER_HOST=tcp://192.168.1.218:2375 docker logs relay-agent-02
#   DOCKER_HOST=tcp://192.168.1.218:2375 docker logs relay-agent-03
#

services:

  # ── relay-agent-01 : client #1 (qualif-host-01) ───────────────────────────
  relay-agent-01:
    build:
      context: ./agent
      dockerfile: Dockerfile.agent
    container_name: relay-agent-01
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      RELAY_SERVER_URL: "http://localhost:7770"
      RELAY_HOSTNAME: "qualif-host-01"
      RELAY_DATA_DIR: "/var/lib/relay-agent"
    volumes:
      - relay_agent_01_data:/var/lib/relay-agent
    network_mode: host

  # ── relay-agent-02 : client #2 (qualif-host-02) ───────────────────────────
  relay-agent-02:
    build:
      context: ./agent
      dockerfile: Dockerfile.agent
    container_name: relay-agent-02
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      RELAY_SERVER_URL: "http://localhost:7770"
      RELAY_HOSTNAME: "qualif-host-02"
      RELAY_DATA_DIR: "/var/lib/relay-agent"
    volumes:
      - relay_agent_02_data:/var/lib/relay-agent
    network_mode: host

  # ── relay-agent-03 : client #3 (qualif-host-03) ───────────────────────────
  relay-agent-03:
    build:
      context: ./agent
      dockerfile: Dockerfile.agent
    container_name: relay-agent-03
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      RELAY_SERVER_URL: "http://localhost:7770"
      RELAY_HOSTNAME: "qualif-host-03"
      RELAY_DATA_DIR: "/var/lib/relay-agent"
    volumes:
      - relay_agent_03_data:/var/lib/relay-agent
    network_mode: host

volumes:
  relay_agent_01_data:
  relay_agent_02_data:
  relay_agent_03_data:
