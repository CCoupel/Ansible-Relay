version: '3'

# Taskfile.yml for automated Python → GO conversion
# Installation: go install github.com/go-task/task/v3/cmd/task@latest
# Usage: task convert-server (or convert-agent, etc)

vars:
  PYTHON_SRC: "server/api"
  GO_SRC: "cmd"
  TOOLS_DIR: "tools"

tasks:
  # Analysis phase
  analyze:
    desc: "Analyze Python codebase structure"
    cmds:
      - python3 <<'EOF'
import ast
import json
import os

analysis = {"files": {}, "functions": [], "classes": []}

for root, dirs, files in os.walk("server/api"):
    for file in files:
        if file.endswith(".py"):
            path = os.path.join(root, file)
            with open(path) as f:
                try:
                    tree = ast.parse(f.read())
                    funcs = [n.name for n in ast.walk(tree) if isinstance(n, ast.FunctionDef)]
                    classes = [n.name for n in ast.walk(tree) if isinstance(n, ast.ClassDef)]
                    analysis["files"][path] = {"functions": funcs, "classes": classes}
                    analysis["functions"].extend([(file, f) for f in funcs])
                    analysis["classes"].extend([(file, c) for c in classes])
                except:
                    pass

with open("analysis.json", "w") as f:
    json.dump(analysis, f, indent=2)

print(f"✅ Analysis: {len(analysis['files'])} files, {len(analysis['functions'])} functions, {len(analysis['classes'])} classes")
EOF

  # Conversion tasks
  convert-register:
    desc: "Convert routes_register.py → handlers/register.go"
    cmds:
      - python3 {{.TOOLS_DIR}}/convert_python_to_go.py \
          --input {{.PYTHON_SRC}}/routes_register.py \
          --output {{.GO_SRC}}/server/internal/handlers/register.go

  convert-exec:
    desc: "Convert routes_exec.py → handlers/exec.go"
    cmds:
      - python3 {{.TOOLS_DIR}}/convert_python_to_go.py \
          --input {{.PYTHON_SRC}}/routes_exec.py \
          --output {{.GO_SRC}}/server/internal/handlers/exec.go

  convert-inventory:
    desc: "Convert routes_inventory.py → handlers/inventory.go"
    cmds:
      - python3 {{.TOOLS_DIR}}/convert_python_to_go.py \
          --input {{.PYTHON_SRC}}/routes_inventory.py \
          --output {{.GO_SRC}}/server/internal/handlers/inventory.go

  convert-ws:
    desc: "Convert ws_handler.py → ws/handler.go (MANUAL review needed)"
    cmds:
      - python3 {{.TOOLS_DIR}}/convert_python_to_go.py \
          --input {{.PYTHON_SRC}}/ws_handler.py \
          --output {{.GO_SRC}}/server/internal/ws/handler.go
      - echo "⚠️  WebSocket handling is complex — manual review required"

  convert-agent:
    desc: "Convert relay_agent.py → agent/main.go"
    cmds:
      - mkdir -p cmd/agent/internal
      - python3 {{.TOOLS_DIR}}/convert_python_to_go.py \
          --input agent/relay_agent.py \
          --output {{.GO_SRC}}/agent/main.go

  convert-facts:
    desc: "Convert facts_collector.py → agent/facts.go"
    cmds:
      - python3 {{.TOOLS_DIR}}/convert_python_to_go.py \
          --input agent/facts_collector.py \
          --output {{.GO_SRC}}/agent/internal/facts.go

  convert-registry:
    desc: "Convert async_registry.py → agent/registry.go"
    cmds:
      - python3 {{.TOOLS_DIR}}/convert_python_to_go.py \
          --input agent/async_registry.py \
          --output {{.GO_SRC}}/agent/internal/registry.go

  # Phase 7: Full server conversion
  convert-server:
    desc: "Convert all server components (Phase 7)"
    deps:
      - analyze
    cmds:
      - task: convert-register
      - task: convert-exec
      - task: convert-inventory
      - task: convert-ws
      - echo "✅ Server conversion complete"
      - echo "📋 Next: Review generated files, run 'task format' and 'task test'"

  # Phase 8: Full agent conversion
  convert-agent-full:
    desc: "Convert all agent components (Phase 8)"
    deps:
      - analyze
    cmds:
      - task: convert-agent
      - task: convert-facts
      - task: convert-registry
      - echo "✅ Agent conversion complete"

  # Formatting & Cleanup
  format:
    desc: "Format GO code (goimports, gofmt)"
    cmds:
      - go install golang.org/x/tools/cmd/goimports@latest
      - goimports -w ./cmd/
      - go fmt ./...
      - echo "✅ Formatting complete"

  lint:
    desc: "Lint GO code (staticcheck)"
    cmds:
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - staticcheck ./cmd/...
      - echo "✅ Linting complete"

  # Testing
  test-server:
    desc: "Test converted server (unit + E2E)"
    cmds:
      - go test ./cmd/server/... -v
      - bash tests/e2e/test_go_server.sh
      - echo "✅ Server tests passed"

  test-agent:
    desc: "Test converted agent (unit + E2E)"
    cmds:
      - go test ./cmd/agent/... -v
      - bash tests/e2e/test_go_agent.sh
      - echo "✅ Agent tests passed"

  # Building
  build-server:
    desc: "Build GO server binary"
    cmds:
      - go build -o relay-server ./cmd/server
      - echo "✅ Built: relay-server"

  build-agent:
    desc: "Build GO agent binary"
    cmds:
      - go build -o relay-agent ./cmd/agent
      - echo "✅ Built: relay-agent"

  build:
    desc: "Build all GO binaries"
    cmds:
      - task: build-server
      - task: build-agent
      - echo "✅ All binaries built"

  # End-to-end pipeline
  phase7:
    desc: "Complete Phase 7 pipeline: analyze → convert-server → format → test → build"
    cmds:
      - task: convert-server
      - task: format
      - task: lint
      - task: build-server
      - task: test-server

  phase8:
    desc: "Complete Phase 8 pipeline: convert-agent → format → test → build"
    cmds:
      - task: convert-agent-full
      - task: format
      - task: lint
      - task: build-agent
      - task: test-agent

  # Cleanup
  clean:
    desc: "Clean generated GO code"
    cmds:
      - rm -rf cmd/server cmd/agent
      - echo "✅ Cleaned generated code"

  # Help
  convert-help:
    desc: "Show conversion workflow"
    cmds:
      - echo "🚀 Python → GO Conversion Workflow"
      - echo ""
      - echo "Phase 7 (Server conversion):"
      - echo "  1. task analyze              — Analyze Python codebase"
      - echo "  2. task convert-server       — Auto-convert all server components"
      - echo "  3. task format               — Format and cleanup code"
      - echo "  4. task lint                 — Check code quality"
      - echo "  5. task test-server          — Run E2E tests"
      - echo "  6. task build-server         — Build final binary"
      - echo ""
      - echo "Or run all at once: task phase7"
      - echo ""
      - echo "Phase 8 (Agent conversion):"
      - echo "  1. task convert-agent-full   — Auto-convert all agent components"
      - echo "  2. task format               — Format code"
      - echo "  3. task lint                 — Check quality"
      - echo "  4. task test-agent           — Run E2E tests"
      - echo "  5. task build-agent          — Build binary"
      - echo ""
      - echo "Or run all at once: task phase8"
