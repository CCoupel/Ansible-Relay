# NATS Server Configuration for AnsibleRelay
# Reference: https://docs.nats.io/running-a-nats-server/configuration

port: 4222

# Enable JetStream
jetstream {
  store_dir: /data/nats
  max_memory_store: 1GB
  max_file_store: 10GB
}

# NATS monitoring/management
http_port: 8222

# Log configuration
log_file: /dev/stdout
debug: false
trace: false

# Connection limits
max_connections: 65536
max_subscriptions: 0  # Unlimited

# Authentication (optional - disabled in dev)
# authorization {
#   users = [
#     { user: "relay", password: "$2a$11$..." }
#   ]
# }

# Cluster configuration (for HA, currently single node)
# cluster {
#   name: relay-cluster
#   listen: 0.0.0.0:6222
#   peers: [...]
# }
